<?xml version="1.0" encoding="UTF-8"?>

<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 640 360"
     fill="none">

  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#A100FF"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="640" height="360" fill="#050814"/>

  <!-- Outer Card -->
  <rect
    x="30"
    y="20"
    width="580"
    height="320"
    rx="24"
    fill="#0B0B1A"
    stroke="#1F2440"/>

  <!-- Inner Card -->
  <rect
    x="85"
    y="50"
    width="470"
    height="220"
    rx="18"
    fill="#161626"
    stroke="#2A2D4A"/>

  <!-- Glow -->
  <circle
    cx="320"
    cy="140"
    r="58"
    fill="url(#accent)"
    opacity="0.25"
    filter="url(#glow)"/>

  <!-- Patent Seal -->
  <circle
    cx="320"
    cy="140"
    r="42"
    fill="url(#accent)"/>

  <!-- Certificate -->
  <rect
    x="285"
    y="105"
    width="70"
    height="55"
    rx="8"
    fill="white"
    fill-opacity="0.95"/>

  <rect
    x="298"
    y="118"
    width="44"
    height="4"
    rx="2"
    fill="#94A3B8"/>

  <rect
    x="298"
    y="128"
    width="34"
    height="4"
    rx="2"
    fill="#CBD5E1"/>

  <rect
    x="298"
    y="138"
    width="40"
    height="4"
    rx="2"
    fill="#CBD5E1"/>

  <!-- Patent Bar -->
  <rect
    x="220"
    y="190"
    width="200"
    height="12"
    rx="6"
    fill="url(#accent)"/>

  <!-- Secondary Bar -->
  <rect
    x="255"
    y="214"
    width="130"
    height="8"
    rx="4"
    fill="#6B7280"
    fill-opacity="0.6"/>

  <!-- Label -->
  <text
    x="320"
    y="255"
    text-anchor="middle"
    font-family="Arial, sans-serif"
    font-size="16"
    letter-spacing="4"
    fill="#AAB2D5">
    PATENT
  </text>

</svg>