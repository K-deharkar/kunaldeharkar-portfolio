<?xml version="1.0" encoding="UTF-8"?>

<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 640 360"
     fill="none">

  <defs>
    <linearGradient id="p1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="360" fill="#0f111a"/>

  <!-- Card -->
  <rect
    x="40"
    y="40"
    width="560"
    height="280"
    rx="16"
    fill="#ffffff"
    fill-opacity="0.03"
    stroke="#ffffff"
    stroke-opacity="0.08"/>

  <!-- Circle -->
  <circle
    cx="320"
    cy="160"
    r="50"
    fill="url(#p1)"
    opacity="0.8"/>

  <!-- Main Bar -->
  <rect
    x="200"
    y="230"
    width="240"
    height="12"
    rx="6"
    fill="url(#p1)"
    opacity="0.6"/>

  <!-- Secondary Bar -->
  <rect
    x="240"
    y="255"
    width="160"
    height="8"
    rx="4"
    fill="#ffffff"
    fill-opacity="0.2"/>

  <!-- Text -->
  <text
    x="320"
    y="310"
    text-anchor="middle"
    font-family="sans-serif"
    font-size="14"
    fill="#94a3b8"
    letter-spacing="3">
    ROBOTICS • IoT
  </text>

</svg>